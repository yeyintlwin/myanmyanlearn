<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{register.title}">MYAN MYAN LEARN - Register</title>
    <!-- Debug: Thymeleaf test -->
    <meta
      name="debug"
      th:content="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/app.css" />
    <script src="/js/tailwind-config.js"></script>
    <style>
      /* Custom checkbox for terms */
      .custom-check-box {
        width: 1.25rem;
        height: 1.25rem;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 0.375rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        cursor: pointer;
        flex-shrink: 0;
      }
      .custom-check-box:hover {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.5);
        transform: scale(1.05);
      }
      .custom-check-box svg {
        width: 0.75rem;
        height: 0.75rem;
        color: #fff;
        opacity: 0;
        transition: opacity 0.2s;
      }

      /* Password strength bar */
      .strength-track {
        width: 100%;
        height: 0.5rem;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 9999px;
        overflow: hidden;
      }
      .strength-fill {
        height: 100%;
        border-radius: 9999px;
        transition: all 0.3s;
        width: 0;
      }
      .strength-fill.bg-danger { background-color: #ef4444; }
      .strength-fill.bg-orange  { background-color: #f67400; }
      .strength-fill.bg-warning { background-color: #eab308; }
      .strength-fill.bg-info    { background-color: #e95420; }
      .strength-fill.bg-success { background-color: #22c55e; }
    </style>
  </head>

  <body class="min-vh-100 d-flex align-items-center justify-content-center p-2 p-sm-4">
    <!-- Navbar -->
    <nav class="navbar navbar-app fixed-top">
      <div class="container-fluid px-3 px-sm-4">
        <div class="navbar-brand d-flex align-items-center gap-2">
          <img th:src="@{/images/logo.svg}" alt="Myan Myan Learn" style="width:2.25rem;height:2.25rem;" />
          <div class="d-flex flex-column lh-sm">
            <span class="brand-text brand-font">Myan Myan Learn</span>
            <span class="brand-subtitle d-none d-sm-block" th:text="#{nav.subtitle}">Learning Platform</span>
          </div>
        </div>
      </div>
    </nav>

    <!-- Auth Card -->
    <div class="card-auth p-4 p-sm-5 mt-4 mt-sm-5 position-relative overflow-hidden">
      <!-- Decorative Background -->
      <div class="decor-circle-tr"></div>
      <div class="decor-circle-bl"></div>

      <!-- Header Section -->
      <div class="position-relative text-center mb-4" style="z-index:1;">
        <div class="auth-icon-box mx-auto mb-3">
          <i class="fas fa-user-plus text-white fs-5"></i>
        </div>
        <h1 class="auth-heading" th:text="#{register.createAccount}">
          Create Account
        </h1>
        <p class="auth-subtitle" th:text="#{register.subtitle}">
          Join our learning community and start your journey
        </p>
      </div>

      <!-- Flash Messages -->
      <div
        th:if="${error}"
        class="alert alert-glass-danger mb-3"
      >
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
      </div>

      <div
        th:if="${success}"
        class="alert alert-glass-success mb-3"
      >
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${success}"></span>
      </div>

      <form method="post" action="/register" class="position-relative" style="z-index:1;">
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />

        <!-- Name Fields -->
        <div class="row g-3 mb-3">
          <div class="col-12 col-sm-6">
            <label for="firstName" class="form-label fw-semibold text-white small mb-2">
              <i class="fas fa-user text-white-70 me-2"></i>
              <span th:text="#{register.firstName}">First Name</span>
            </label>
            <div class="input-icon-wrap">
              <span class="input-icon"><i class="fas fa-user"></i></span>
              <input
                id="firstName"
                name="firstName"
                type="text"
                class="form-control form-control-glass"
                th:placeholder="#{register.firstNamePlaceholder}"
                placeholder="John"
                th:value="${firstName ?: ''}"
                required
              />
            </div>
          </div>
          <div class="col-12 col-sm-6">
            <label for="lastName" class="form-label fw-semibold text-white small mb-2">
              <i class="fas fa-user text-white-70 me-2"></i>
              <span th:text="#{register.lastName}">Last Name</span>
            </label>
            <div class="input-icon-wrap">
              <span class="input-icon"><i class="fas fa-user"></i></span>
              <input
                id="lastName"
                name="lastName"
                type="text"
                class="form-control form-control-glass"
                th:placeholder="#{register.lastNamePlaceholder}"
                placeholder="Doe"
                th:value="${lastName ?: ''}"
                required
              />
            </div>
          </div>
        </div>

        <!-- Username Field -->
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold text-white small mb-2">
            <i class="fas fa-at text-white-70 me-2"></i>
            <span th:text="#{login.username}">Username</span>
          </label>
          <div class="input-icon-wrap">
            <span class="input-icon"><i class="fas fa-user-circle"></i></span>
            <input
              id="username"
              name="username"
              type="text"
              minlength="3"
              maxlength="50"
              pattern="[A-Za-z0-9._]{3,50}"
              class="form-control form-control-glass"
              th:placeholder="#{register.usernamePlaceholder}"
              placeholder="johndoe123"
              th:value="${username ?: ''}"
              required
            />
          </div>
        </div>

        <!-- Email Field -->
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold text-white small mb-2">
            <i class="fas fa-envelope text-white-70 me-2"></i>
            <span th:text="#{register.email}">Email Address</span>
          </label>
          <div class="input-icon-wrap">
            <span class="input-icon"><i class="fas fa-envelope"></i></span>
            <input
              id="email"
              name="email"
              type="email"
              class="form-control form-control-glass"
              th:placeholder="#{register.emailPlaceholder}"
              placeholder="you@example.com"
              th:value="${email ?: ''}"
              required
            />
          </div>
        </div>

        <!-- Password Field -->
        <div class="mb-3">
          <label for="password" class="form-label fw-semibold text-white small mb-2">
            <i class="fas fa-lock text-white-70 me-2"></i>
            <span th:text="#{login.password}">Password</span>
          </label>
          <div class="input-icon-wrap">
            <span class="input-icon"><i class="fas fa-key"></i></span>
            <input
              id="password"
              name="password"
              type="password"
              class="form-control form-control-glass"
              th:placeholder="#{register.passwordCreatePlaceholder}"
              placeholder="Create a strong password"
              required
            />
            <button
              type="button"
              class="input-icon-right"
              onclick="togglePassword('password')"
            >
              <i class="fas fa-eye" id="passwordToggle"></i>
            </button>
          </div>

          <!-- Password Strength Indicator -->
          <div id="passwordStrength" class="mt-2 d-none">
            <div class="d-flex align-items-center mb-2">
              <span
                class="small text-white-70 me-2"
                th:text="#{register.passwordStrength}"
                >Password Strength:</span
              >
              <span id="strengthText" class="small fw-medium"></span>
            </div>
            <div class="strength-track">
              <div id="strengthBar" class="strength-fill"></div>
            </div>
            <div id="strengthRequirements" class="mt-2 small text-white-70">
              <div id="lengthReq" class="d-flex align-items-center mb-1">
                <i class="fas fa-check text-success me-2 d-none"></i>
                <i class="fas fa-times text-danger me-2"></i>
                <span th:text="#{register.req.length}">At least 8 characters</span>
              </div>
              <div id="upperReq" class="d-flex align-items-center mb-1">
                <i class="fas fa-check text-success me-2 d-none"></i>
                <i class="fas fa-times text-danger me-2"></i>
                <span th:text="#{register.req.upper}">One uppercase letter</span>
              </div>
              <div id="lowerReq" class="d-flex align-items-center mb-1">
                <i class="fas fa-check text-success me-2 d-none"></i>
                <i class="fas fa-times text-danger me-2"></i>
                <span th:text="#{register.req.lower}">One lowercase letter</span>
              </div>
              <div id="numberReq" class="d-flex align-items-center mb-1">
                <i class="fas fa-check text-success me-2 d-none"></i>
                <i class="fas fa-times text-danger me-2"></i>
                <span th:text="#{register.req.number}">One number</span>
              </div>
              <div id="specialReq" class="d-flex align-items-center mb-1">
                <i class="fas fa-check text-success me-2 d-none"></i>
                <i class="fas fa-times text-danger me-2"></i>
                <span th:text="#{register.req.special}">One special character</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Confirm Password Field -->
        <div class="mb-3">
          <label for="confirmPassword" class="form-label fw-semibold text-white small mb-2">
            <i class="fas fa-lock text-white-70 me-2"></i>
            <span th:text="#{register.confirmPassword}">Confirm Password</span>
          </label>
          <div class="input-icon-wrap">
            <span class="input-icon"><i class="fas fa-key"></i></span>
            <input
              id="confirmPassword"
              name="confirmPassword"
              type="password"
              class="form-control form-control-glass"
              th:placeholder="#{register.confirmPasswordPlaceholder}"
              placeholder="Confirm your password"
              required
            />
            <button
              type="button"
              class="input-icon-right"
              onclick="togglePassword('confirmPassword')"
            >
              <i class="fas fa-eye" id="confirmPasswordToggle"></i>
            </button>
          </div>
        </div>

        <!-- Terms and Conditions -->
        <div class="mb-4">
          <label class="d-flex align-items-center" style="cursor:pointer;">
            <div class="position-relative">
              <input type="checkbox" class="visually-hidden" required />
              <div class="custom-check-box">
                <svg fill="currentColor" viewBox="0 0 20 20">
                  <path
                    fill-rule="evenodd"
                    d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                    clip-rule="evenodd"
                  ></path>
                </svg>
              </div>
            </div>
            <span class="ms-2 small text-white-70">
              <span th:text="#{register.agree}">I agree to the</span>
              <a href="#" class="text-white-70 text-decoration-underline" th:text="#{register.tos}">
                Terms of Service
              </a>
              <span th:text="#{register.and}">and</span>
              <a href="#" class="text-white-70 text-decoration-underline" th:text="#{register.privacy}">
                Privacy Policy
              </a>
            </span>
          </label>
        </div>

        <!-- Create Account Button -->
        <div class="mb-4">
          <button type="submit" class="btn btn-glass btn-lg w-100">
            <i class="fas fa-user-plus me-2"></i>
            <span th:text="#{register.createAccount}">Create Account</span>
          </button>
        </div>

        <!-- Divider -->
        <div class="text-center mb-4">
          <span class="small text-white-70" th:text="#{register.already}">Already have an account?</span>
        </div>

        <!-- Sign In Link -->
        <div class="text-center">
          <a href="/login" class="btn btn-glass-light btn-lg w-100">
            <i class="fas fa-sign-in-alt me-2"></i>
            <span th:text="#{login.signIn}">Sign In</span>
          </a>
        </div>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function togglePassword(fieldId) {
        const passwordInput = document.getElementById(fieldId);
        const passwordToggle = document.getElementById(fieldId + "Toggle");

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          passwordToggle.classList.remove("fa-eye");
          passwordToggle.classList.add("fa-eye-slash");
        } else {
          passwordInput.type = "password";
          passwordToggle.classList.remove("fa-eye-slash");
          passwordToggle.classList.add("fa-eye");
        }
      }

      // Handle custom checkbox
      document.addEventListener("DOMContentLoaded", function () {
        const checkbox = document.querySelector('input[type="checkbox"]');
        const checkboxVisual = checkbox.nextElementSibling;
        const checkmark = checkboxVisual.querySelector("svg");

        checkbox.addEventListener("change", function () {
          if (this.checked) {
            checkboxVisual.style.background = "rgba(255, 255, 255, 0.2)";
            checkboxVisual.style.borderColor = "rgba(255, 255, 255, 0.5)";
            checkmark.style.opacity = "1";
          } else {
            checkboxVisual.style.background = "rgba(255, 255, 255, 0.1)";
            checkboxVisual.style.borderColor = "rgba(255, 255, 255, 0.3)";
            checkmark.style.opacity = "0";
          }
        });

        // Handle click on visual checkbox
        checkboxVisual.addEventListener("click", function (e) {
          e.preventDefault();
          checkbox.checked = !checkbox.checked;
          checkbox.dispatchEvent(new Event("change"));
        });

        // Password strength validation
        const passwordInput = document.getElementById("password");
        const passwordStrength = document.getElementById("passwordStrength");
        const strengthText = document.getElementById("strengthText");
        const strengthBar = document.getElementById("strengthBar");

        passwordInput.addEventListener("input", function () {
          const password = this.value;

          if (password.length > 0) {
            passwordStrength.classList.remove("d-none");
            updatePasswordStrength(password);
          } else {
            passwordStrength.classList.add("d-none");
          }
        });

        function updatePasswordStrength(password) {
          const requirements = {
            length: password.length >= 8,
            upper: /[A-Z]/.test(password),
            lower: /[a-z]/.test(password),
            number: /[0-9]/.test(password),
            special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password),
          };

          // Update requirement indicators
          updateRequirement("lengthReq", requirements.length);
          updateRequirement("upperReq", requirements.upper);
          updateRequirement("lowerReq", requirements.lower);
          updateRequirement("numberReq", requirements.number);
          updateRequirement("specialReq", requirements.special);

          // Calculate strength score
          const score = Object.values(requirements).filter(Boolean).length;
          const strength = getStrengthLevel(score);

          // Update strength text and bar
          strengthText.textContent = strength.text;
          strengthText.className = `small fw-medium ${strength.color}`;
          strengthBar.className = `strength-fill ${strength.bgColor}`;
          strengthBar.style.width = `${(score / 5) * 100}%`;
        }

        function updateRequirement(elementId, isValid) {
          const element = document.getElementById(elementId);
          const checkIcon = element.querySelector(".fa-check");
          const timesIcon = element.querySelector(".fa-times");

          if (isValid) {
            checkIcon.classList.remove("d-none");
            timesIcon.classList.add("d-none");
          } else {
            checkIcon.classList.add("d-none");
            timesIcon.classList.remove("d-none");
          }
        }

        function getStrengthLevel(score) {
          if (score < 2)
            return {
              text: "Very Weak",
              color: "text-danger",
              bgColor: "bg-danger",
            };
          if (score < 3)
            return {
              text: "Weak",
              color: "text-warning",
              bgColor: "bg-orange",
            };
          if (score < 4)
            return {
              text: "Medium",
              color: "text-warning",
              bgColor: "bg-warning",
            };
          if (score < 5)
            return {
              text: "Strong",
              color: "text-info",
              bgColor: "bg-info",
            };
          return {
            text: "Very Strong",
            color: "text-success",
            bgColor: "bg-success",
          };
        }

        // Password confirmation validation
        const confirmPasswordInput = document.getElementById("confirmPassword");

        function showFieldError(field, message) {
          // Remove existing error
          const existingError = field.parentNode.querySelector(".field-error");
          if (existingError) {
            existingError.remove();
          }

          // Add error message
          const errorDiv = document.createElement("div");
          errorDiv.className =
            "field-error text-danger small mt-1 d-flex align-items-center";
          errorDiv.innerHTML = `<i class="fas fa-exclamation-circle me-1"></i>${message}`;
          field.parentNode.appendChild(errorDiv);

          // Add error styling to field
          field.classList.add("border-danger");
        }

        function clearFieldError(field) {
          const existingError = field.parentNode.querySelector(".field-error");
          if (existingError) {
            existingError.remove();
          }
          field.classList.remove("border-danger");
        }

        function validatePasswordConfirmation() {
          const password = passwordInput.value;
          const confirmPassword = confirmPasswordInput.value;

          if (confirmPassword && password !== confirmPassword) {
            showFieldError(confirmPasswordInput, "Passwords do not match");
            return false;
          } else {
            clearFieldError(confirmPasswordInput);
            return true;
          }
        }

        // Real-time password confirmation validation
        confirmPasswordInput.addEventListener("input", function () {
          validatePasswordConfirmation();
        });

        passwordInput.addEventListener("input", function () {
          if (confirmPasswordInput.value) {
            validatePasswordConfirmation();
          }
        });

        // Form submission validation
        document.querySelector("form").addEventListener("submit", function (e) {
          e.preventDefault();

          const password = passwordInput.value;
          const confirmPassword = confirmPasswordInput.value;

          // Validate password confirmation
          if (password !== confirmPassword) {
            showFieldError(confirmPasswordInput, "Passwords do not match");
            return;
          }

          // If validation passes, submit the form
          this.submit();
        });
      });
    </script>
  </body>
</html>

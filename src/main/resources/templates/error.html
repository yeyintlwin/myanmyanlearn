<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{error.title}">Page Not Found - Myan Myan Learn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/app.css" />
    <script src="/js/tailwind-config.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body class="min-vh-100 d-flex align-items-center justify-content-center p-2 p-sm-4">
    <!-- Error Content -->
    <div class="w-100 text-center" style="max-width:40rem;">
      <!-- Error Code -->
      <div class="mb-4">
        <h1 class="display-1 fw-bold text-white mb-3 brand-font">404</h1>
        <h2
          class="fs-3 fw-bold text-white mb-3"
          th:text="#{error.header}"
        >
          Page Not Found
        </h2>
        <p class="text-white-70" th:text="#{error.message}">
          The page you're looking for doesn't exist.
        </p>
      </div>

      <!-- Action Button -->
      <div class="d-flex justify-content-center align-items-center">
        <a
          href="/"
          class="btn btn-glass btn-lg text-decoration-none"
        >
          <span th:text="#{error.goHome}">Go Home</span>
        </a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

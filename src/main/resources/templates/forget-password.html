<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{forget.title}">MYAN MYAN LEARN - Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/app.css" />
    <script src="/js/tailwind-config.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body class="min-vh-100 d-flex align-items-center justify-content-center p-2 p-sm-4">
    <!-- Navbar -->
    <nav class="navbar navbar-app fixed-top">
      <div class="container-fluid px-3 px-sm-4">
        <div class="navbar-brand d-flex align-items-center gap-2">
          <img th:src="@{/images/logo.svg}" alt="Myan Myan Learn" style="width:2.25rem;height:2.25rem;" />
          <div class="d-flex flex-column lh-sm">
            <span class="brand-text brand-font">Myan Myan Learn</span>
            <span class="brand-subtitle d-none d-sm-block" th:text="#{nav.subtitle}">Learning Platform</span>
          </div>
        </div>
      </div>
    </nav>

    <!-- Auth Card -->
    <div class="card-auth p-4 p-sm-5 mt-4 mt-sm-5" style="max-width:28rem;width:100%;">
      <div class="decor-circle-tr"></div>
      <div class="decor-circle-bl"></div>

      <!-- Back Link -->
      <div class="position-relative mb-3" style="z-index:1;">
        <a
          href="/login"
          class="d-inline-flex align-items-center text-white-70 small text-decoration-none"
        >
          <i class="fas fa-arrow-left me-2"></i>
          <span th:text="#{forget.backToLogin}">Back to Login</span>
        </a>
      </div>

      <!-- Header Section -->
      <div class="position-relative text-center mb-4" style="z-index:1;">
        <div class="auth-icon-box mx-auto mb-3">
          <i class="fas fa-lock text-white fs-5"></i>
        </div>
        <h1 class="auth-heading" th:text="#{forget.header}">
          Forgot Password?
        </h1>
        <p class="auth-subtitle" th:text="#{forget.subtitle}">
          No worries! Enter your email address and we'll send you a link to
          reset your password
        </p>
      </div>

      <form
        method="post"
        action="/forget-password"
        class="position-relative"
        style="z-index:1;"
        th:action="@{/forget-password}"
      >
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />
        <!-- Email Field -->
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold text-white">
            <i class="fas fa-envelope text-white-70 me-2"></i>
            <span th:text="#{register.email}">Email Address</span>
          </label>
          <div class="input-icon-wrap">
            <i class="fas fa-envelope"></i>
            <input
              id="email"
              name="email"
              type="email"
              class="form-control form-control-glass"
              th:placeholder="#{register.emailPlaceholder}"
              placeholder="you@example.com"
              required
              th:value="${email}"
            />
          </div>
        </div>

        <!-- Error message -->
        <div th:if="${error}" class="mb-3">
          <div class="alert alert-glass-danger p-3">
            <div class="d-flex align-items-center gap-2">
              <i class="fas fa-triangle-exclamation"></i>
              <span th:text="${error}">Email not found. Please check and try again.</span>
            </div>
          </div>
        </div>

        <!-- Send Reset Link Button -->
        <div class="mb-3">
          <button type="submit" class="btn btn-glass btn-lg w-100">
            <i class="fas fa-paper-plane me-2"></i>
            <span th:text="#{forget.send}">Send Reset Link</span>
          </button>
        </div>

        <!-- Remember Password Link -->
        <div class="text-center">
          <a
            href="/login"
            class="text-white-70 small fw-medium text-decoration-none"
            th:text="#{forget.rememberAndSignIn}"
            >Remember your password? Sign In</a
          >
        </div>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MYAN MYAN LEARN - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/app.css" />
    <script src="/js/tailwind-config.js"></script>
  </head>

  <body class="min-vh-100 d-flex flex-column">
    <!-- Navbar -->
    <nav th:replace="fragments/navbar :: appNavbar('Learning Platform')"></nav>

    <!-- Main Content -->
    <main class="flex-grow-1" style="padding-top:5rem;padding-bottom:3rem;">
      <div class="container" style="max-width:64rem;">
        <!-- Our Courses Title -->
        <div class="d-flex align-items-center justify-content-between mb-4">
          <h2
            class="page-heading"
            th:text="#{home.ourCourses}"
          >
            Our Courses
          </h2>
        </div>

        <!-- Course List -->
        <div class="d-flex flex-column gap-3">
          <!-- Course Items -->
          <a
            th:each="course : ${courses}"
            th:href="@{/contents(courseId=${course.id})}"
            href="/contents"
            class="course-card p-3 p-sm-4 d-flex align-items-start gap-2 gap-sm-3 text-decoration-none"
            th:with="pct=${courseProgress != null ? (courseProgress[course.id] ?: 0) : 0}, hasQ=${courseHasQuestions != null ? (courseHasQuestions[course.id] ?: false) : false}"
          >
            <!-- Image -->
            <div class="rounded-3 overflow-hidden flex-shrink-0" style="width:4rem;height:5rem;">
              <img
                th:src="${course.logo}"
                src=""
                alt="Course Cover"
                class="w-100 h-100"
                style="object-fit:cover;"
              />
            </div>
            <!-- Text -->
            <div class="flex-grow-1" style="min-width:0;">
              <div
                class="text-white fw-semibold fs-6 text-truncate mb-1"
                th:text="${course.title}"
              >
                Course Title
              </div>
              <div
                class="text-white-70 small"
                style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"
                th:text="${course.description}"
              >
                Course description
              </div>
            </div>
            <!-- Percentage Block -->
            <div class="d-none d-sm-flex flex-column align-items-start text-start" style="line-height:1;" th:if="${hasQ}">
              <span
                class="text-white-70"
                style="font-size:0.625rem;"
                th:text="#{home.youHave}"
                >You have</span
              >
              <span
                class="text-white fw-bold"
                style="font-size:3.5rem;"
                th:text="${pct + '%'}"
                >50%</span
              >
              <span
                class="text-white-70"
                style="font-size:0.625rem;"
                th:text="#{home.passPossibility}"
                >possibility to pass the exam.</span
              >
            </div>
          </a>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/navbar.js"></script>
  </body>
</html>

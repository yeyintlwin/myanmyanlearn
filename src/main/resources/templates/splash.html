<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{splash.pageTitle}">MYAN MYAN LEARN - Loading</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/app.css" />
    <script src="/js/tailwind-config.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @keyframes shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      .shimmer-animation {
        animation: shimmer 1.5s ease-in-out infinite;
      }
    </style>
  </head>

  <body
    class="vh-100 d-flex align-items-center justify-content-center overflow-hidden"
  >
    <div class="w-100 d-flex flex-column align-items-center text-center px-3 px-sm-5" style="max-width:56rem;">
      <img
        th:src="@{/images/logo.svg}"
        th:alt="#{splash.logoAlt}"
        alt="Myan Myan Learn"
        style="width:12rem;height:auto;"
        class="mb-4"
      />
      <div
        class="fs-2 fw-bold text-white mb-4 brand-font"
        th:text="#{app.brand}"
      >
        Myan Myan Learn
      </div>

      <!-- Progress Bar -->
      <div class="w-100" style="max-width:20rem;">
        <div class="progress" style="height:.5rem;background:rgba(255,255,255,.2);border-radius:9999px;">
          <div
            class="progress-bar position-relative overflow-hidden"
            role="progressbar"
            id="progressBar"
            style="width:0%;background:rgba(255,255,255,.8);border-radius:9999px;transition:width .3s;"
            aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"
          >
            <!-- Loading animation shimmer effect -->
            <div
              class="position-absolute top-0 start-0 w-100 h-100 shimmer-animation"
              style="background:linear-gradient(to right,transparent,rgba(255,255,255,.3),transparent);"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Function to get cookie value
      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(";").shift();
        return null;
      }

      // Check for existing language preference
      function checkLanguagePreference() {
        const savedLanguage =
          getCookie("selectedLanguage") ||
          localStorage.getItem("selectedLanguage");
        return savedLanguage;
      }

      // Check if intro has been completed
      function checkIntroCompletion() {
        const introCompleted = getCookie("introCompleted");
        return introCompleted;
      }

      // Progress bar animation - 0% to 100% in 3 seconds
      const progressBar = document.getElementById("progressBar");
      const totalDuration = 3000; // 3 seconds in milliseconds
      const startTime = Date.now();

      function updateProgress() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min((elapsed / totalDuration) * 100, 100);

        progressBar.style.width = progress + "%";

        if (progress < 100) {
          requestAnimationFrame(updateProgress);
        } else {
          // Check for existing language preference and intro completion
          const savedLanguage = checkLanguagePreference();
          const introCompleted = checkIntroCompletion();

          // Determine next step based on user progress
          setTimeout(function () {
            if (savedLanguage) {
              // Language already selected, check if intro completed
              if (introCompleted) {
                // Both language and intro completed, go to home
                window.location.href = "/home";
              } else {
                // Language selected but intro not completed, go to intro
                window.location.href = "/intro";
              }
            } else {
              // No language selected yet, go to language selection
              window.location.href = "/language";
            }
          }, 100);
        }
      }

      // Start the animation
      requestAnimationFrame(updateProgress);
    </script>
  </body>
</html>

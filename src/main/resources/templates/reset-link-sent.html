<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{resetSent.title}">
      MYAN MYAN LEARN - Reset Link Sent
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/app.css" />
    <script src="/js/tailwind-config.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body class="min-vh-100 d-flex align-items-center justify-content-center p-2 p-sm-4">
    <!-- Card -->
    <div class="card-auth p-4 p-sm-5" style="max-width:28rem;width:100%;">
      <div class="decor-circle-tr"></div>
      <div class="decor-circle-bl"></div>

      <div class="position-relative text-center" style="z-index:1;">
        <div class="auth-icon-box mx-auto mb-3">
          <i class="fas fa-envelope-circle-check text-white fs-5"></i>
        </div>
        <h1 class="auth-heading" th:text="#{resetSent.header}">
          Check your email
        </h1>
        <p
          class="auth-subtitle mx-auto"
          style="max-width:22rem;"
          th:text="#{resetSent.message}"
        >
          If an account exists for the email you entered, we've sent a password
          reset link. The link will expire in 60 minutes.
        </p>

        <!-- Actions -->
        <div class="mt-4 d-flex flex-column gap-2">
          <a
            href="/login"
            class="btn btn-glass btn-lg w-100 text-decoration-none"
          >
            <i class="fas fa-sign-in-alt me-2"></i>
            <span th:text="#{resetSent.backToSignIn}">Back to Sign In</span>
          </a>

          <a
            href="/forget-password"
            class="btn btn-glass-light btn-lg w-100 text-decoration-none"
          >
            <i class="fas fa-paper-plane me-2"></i>
            <span th:text="#{resetSent.sendAgain}">Send again</span>
          </a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <body>
    <nav
      th:fragment="appNavbar(subtitle)"
      class="navbar navbar-app navbar-expand fixed-top"
    >
      <div class="container-fluid px-3 px-sm-4">
        <!-- Brand -->
        <a th:href="@{/home}" class="navbar-brand d-flex align-items-center gap-2">
          <img th:src="@{/images/logo.svg}" alt="Myan Myan Learn" class="d-block" />
          <div class="d-flex flex-column lh-sm">
            <span class="brand-text brand-font">Myan Myan Learn</span>
            <span class="brand-subtitle d-none d-sm-block" th:text="#{nav.subtitle}">Learning Platform</span>
          </div>
        </a>

        <!-- Profile dropdown -->
        <div class="dropdown">
          <button class="btn-profile" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="profileMenu">
            <div th:if="${userProfileImage != null and !#strings.isEmpty(userProfileImage)}" class="avatar">
              <img th:src="${userProfileImage}" class="w-100 h-100 object-fit-cover" alt="Profile" />
            </div>
            <div th:if="${userProfileImage == null or #strings.isEmpty(userProfileImage)}" class="avatar-placeholder">
              <span th:text="${userInitials ?: 'U'}">U</span>
            </div>
            <div class="d-none d-sm-flex flex-column lh-sm">
              <span class="fw-semibold small" th:text="${userFullName ?: username ?: 'User'}"></span>
              <span class="small text-white-70" th:text="${userRoleLabel}">Member</span>
            </div>
            <i class="fas fa-chevron-down small opacity-50"></i>
          </button>

          <div class="dropdown-menu dropdown-menu-end dropdown-menu-profile" id="profileDropdown">
            <!-- Header -->
            <a th:href="@{/profile}" href="/profile" class="dropdown-header-card d-flex align-items-center gap-3 text-decoration-none">
              <div th:if="${userProfileImage != null and !#strings.isEmpty(userProfileImage)}" class="rounded-2 overflow-hidden" style="width:3rem;height:3rem;">
                <img th:src="${userProfileImage}" class="w-100 h-100 object-fit-cover" alt="Profile" />
              </div>
              <div th:if="${userProfileImage == null or #strings.isEmpty(userProfileImage)}" class="rounded-2 d-flex align-items-center justify-content-center text-white fw-bold fs-5" style="width:3rem;height:3rem;background:rgba(255,255,255,.2);">
                <span th:text="${userInitials ?: 'U'}">U</span>
              </div>
              <div>
                <div class="fw-semibold small text-white" th:text="${userFullName ?: username}"></div>
                <div class="small opacity-75 text-white" th:text="${userEmail ?: 'user@example.com'}"></div>
              </div>
            </a>

            <!-- Menu items -->
            <div class="py-2">
              <a href="/profile" class="dropdown-item">
                <span class="dropdown-icon bg-primary bg-opacity-10"><i class="fas fa-user text-primary"></i></span>
                <span th:text="#{nav.profile}">My Profile</span>
              </a>
              <a th:if="${canSeeAdminPanel}" th:href="@{/admin}" href="/admin" class="dropdown-item">
                <span class="dropdown-icon" style="background:rgba(100,116,139,.1);"><i class="fas fa-shield-halved" style="color:#64748b;"></i></span>
                <span th:text="#{nav.admin}">Admin</span>
              </a>

              <!-- Languages submenu -->
              <div class="dropstart" id="languagesItem">
                <button class="dropdown-item w-100 border-0 bg-transparent" data-bs-toggle="dropdown" aria-expanded="false">
                  <span class="dropdown-icon" style="background:rgba(16,185,129,.1);"><i class="fas fa-globe" style="color:#10b981;"></i></span>
                  <span class="flex-grow-1 text-start" th:text="#{nav.languages}">Languages</span>
                  <span id="currentLanguageSmall" class="small text-muted me-1">EN</span>
                  <i class="fas fa-chevron-left small text-muted"></i>
                </button>
                <div class="dropdown-menu dropdown-menu-profile" id="languageSubmenu">
                  <div class="dropdown-header-card py-2 px-3">
                    <div class="d-flex align-items-center gap-2">
                      <span class="dropdown-icon bg-white bg-opacity-25"><i class="fas fa-globe text-white small"></i></span>
                      <div>
                        <div class="fw-semibold small text-white" th:text="#{nav.languages}">Languages</div>
                        <div class="small opacity-75 text-white" th:text="#{nav.chooseLanguage}">Choose language</div>
                      </div>
                    </div>
                  </div>
                  <div class="py-1" style="max-height:15rem;overflow-y:auto;">
                    <div class="dropdown-item language-item" data-lang="en"><span class="me-2">🇺🇸</span> English</div>
                    <div class="dropdown-item language-item" data-lang="my"><span class="me-2">🇲🇲</span> မြန်မာ</div>
                    <div class="dropdown-item language-item" data-lang="zh"><span class="me-2">🇨🇳</span> 中文</div>
                    <div class="dropdown-item language-item" data-lang="ne"><span class="me-2">🇳🇵</span> नेपाली</div>
                    <div class="dropdown-item language-item" data-lang="vi"><span class="me-2">🇻🇳</span> Tiếng Việt</div>
                    <div class="dropdown-item language-item" data-lang="uz"><span class="me-2">🇺🇿</span> O'zbek</div>
                    <div class="dropdown-item language-item" data-lang="si"><span class="me-2">🇱🇰</span> සිංහල</div>
                    <div class="dropdown-item language-item" data-lang="hi"><span class="me-2">🇮🇳</span> हिन्दी</div>
                    <div class="dropdown-item language-item" data-lang="ja"><span class="me-2">🇯🇵</span> 日本語</div>
                    <div class="dropdown-item language-item" data-lang="bn"><span class="me-2">🇧🇩</span> বাংলা</div>
                  </div>
                </div>
              </div>

              <hr class="my-2" />
              <a th:href="@{/about}" href="/about" class="dropdown-item">
                <span class="dropdown-icon" style="background:rgba(var(--secondary-rgb),.1);"><i class="fas fa-circle-info" style="color:var(--secondary);"></i></span>
                <span th:text="#{nav.about}">About</span>
              </a>
              <hr class="my-2" />
              <form th:action="@{/logout}" method="POST" class="w-100">
                <button type="submit" class="dropdown-item text-danger w-100 border-0 bg-transparent">
                  <span class="dropdown-icon" style="background:rgba(239,68,68,.1);"><i class="fas fa-sign-out-alt text-danger small"></i></span>
                  <span th:text="#{nav.logout}">Logout</span>
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </nav>
  </body>
</html>

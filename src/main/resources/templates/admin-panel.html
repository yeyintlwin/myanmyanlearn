<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{adminPanel.pageTitle}">
      MYAN MYAN LEARN - Admin Panel
    </title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/app.css" />
    <script src="/js/tailwind-config.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <nav th:replace="fragments/navbar :: appNavbar(#{nav.adminPanel})"></nav>

    <main class="flex-grow-1" style="padding-top:5rem;padding-bottom:2.5rem;">
      <div class="container" style="max-width:80rem;">
        <div class="d-flex align-items-center justify-content-between gap-3 mb-4">
          <h1 class="page-heading mb-0">
            <span th:text="#{nav.adminPanel}">Admin Panel</span>
          </h1>
          <a
            th:href="@{/home}"
            href="/home"
            class="btn btn-back flex-shrink-0"
          >
            <i class="fas fa-arrow-left" style="font-size:.75rem;"></i>
            <span th:text="#{reader.back}">Back</span>
          </a>
        </div>

        <section class="card-glass-lg overflow-hidden" style="min-height:360px;">
          <div class="row g-0" style="min-height:360px;">
            <!-- Sidebar -->
            <div class="col-sm-auto p-2" style="width:auto;">
              <nav class="d-flex flex-column gap-1" style="min-width:0;">
                <a
                  th:href="@{/admin(section='courses')}"
                  href="/admin?section=courses"
                  th:classappend="${section == 'courses'} ? ' active' : ''"
                  class="admin-sidebar-link"
                  style="min-width:0;"
                >
                  <div
                    th:classappend="${section == 'courses'} ? '' : ''"
                    class="admin-sidebar-icon"
                  >
                    <i class="fas fa-book" style="font-size:.875rem;"></i>
                  </div>
                  <div
                    class="flex-grow-1 fw-semibold d-none d-sm-block"
                    th:text="#{adminPanel.courses}"
                    style="width:12rem;"
                  >
                    Courses Management
                  </div>
                </a>

                <a
                  th:if="${isAdmin}"
                  th:href="@{/admin(section='users')}"
                  href="/admin?section=users"
                  th:classappend="${section == 'users'} ? ' active' : ''"
                  class="admin-sidebar-link"
                >
                  <div class="admin-sidebar-icon">
                    <i class="fas fa-users" style="font-size:.875rem;"></i>
                  </div>
                  <div
                    class="flex-grow-1 fw-semibold d-none d-sm-block"
                    th:text="#{adminPanel.userManagement}"
                    style="width:12rem;"
                  >
                    User Management
                  </div>
                </a>

                <a
                  th:href="@{/admin(section='settings')}"
                  href="/admin?section=settings"
                  th:classappend="${section == 'settings'} ? ' active' : ''"
                  class="admin-sidebar-link"
                >
                  <div class="admin-sidebar-icon">
                    <i class="fas fa-gear" style="font-size:.875rem;"></i>
                  </div>
                  <div
                    class="flex-grow-1 fw-semibold d-none d-sm-block"
                    th:text="#{adminPanel.settings}"
                    style="width:12rem;"
                  >
                    Settings
                  </div>
                </a>
              </nav>
            </div>

            <!-- Divider -->
            <div class="d-sm-none" style="height:1px;background:rgba(255,255,255,.1);"></div>
            <div class="d-none d-sm-block my-3" style="width:1px;background:rgba(255,255,255,.1);flex-shrink:0;"></div>

            <!-- Content -->
            <div class="col p-4 p-sm-4 overflow-hidden">
              <div th:switch="${section}">
                <div th:case="'users'">
                  <div th:if="${isAdmin}">
                    <div
                      th:replace="fragments/admin-users :: usersSection"
                    ></div>
                  </div>
                </div>
                <div th:case="'settings'">
                  <div
                    th:replace="fragments/admin-settings :: settingsSection"
                  ></div>
                </div>
                <div th:case="'courses'">
                  <div
                    th:replace="fragments/admin-courses :: coursesSection"
                  ></div>
                </div>
                <div th:case="*">
                  <div
                    th:replace="fragments/admin-courses :: coursesSection"
                  ></div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div th:replace="fragments/admin-courses :: coursesOverlays"></div>
    <div th:replace="fragments/admin-users :: usersOverlays"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/navbar.js"></script>
    <script src="/js/admin-users.js"></script>
    <script src="/js/admin-courses.js"></script>
  </body>
</html>

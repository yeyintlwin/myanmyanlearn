# CI/CD: Gradle build → Docker image push to GHCR → SSH deploy on Lightsail (docker compose)
#
# GitHub repository secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST          Lightsail public IP or hostname
#   SSH_USER          e.g. ubuntu
#   SSH_PRIVATE_KEY   PEM for that user (full key including BEGIN/END lines)
#   DEPLOY_PATH       Absolute path on server where docker-compose.yml and .env live (e.g. /home/ubuntu/myanmyanlearn)
#
# Optional (only if GHCR package is private — public image needs no login on server):
#   GHCR_PULL_TOKEN   GitHub PAT with read:packages
#
# On the server, ensure Docker + Compose v2 are installed and the app user can run docker.
# In the deploy directory .env, MYSQL_* etc. must be set; DOCKER_IMAGE is overridden by this workflow.

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Gradle build
        run: chmod +x ./gradlew && ./gradlew build --no-daemon

  build-and-push:
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: GHCR image name (lowercase)
        id: image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${REPO_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            export DOCKER_IMAGE="ghcr.io/${REPO_LOWER}:latest"
            cd "${{ secrets.DEPLOY_PATH }}"
            if [ -n "${{ secrets.GHCR_PULL_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            fi
            docker compose pull app
            docker compose up -d --no-build app
